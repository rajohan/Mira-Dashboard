coverage:
    precision: 2
    round: down
    range: 70..100
    status:
        project:
            default:
                target: 100%
                threshold: 0%
                if_ci_failed: error
        patch:
            default:
                target: 100%
                threshold: 0%
                if_ci_failed: error

comment:
    layout: "reach,diff,flags,tree"
    behavior: default
    require_changes: false

flags:
    frontend:
        paths:
            - src/
