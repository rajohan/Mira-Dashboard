[test]
root = "src"
preload = ["./src/test/setup.ts"]
coverageReporter = ["text", "lcov"]
coverageDirectory = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
    "src/test/**",
    "src/types/**",
    "src/**/*.d.ts",
]

[serve.static]
plugins = ["bun-plugin-tailwind", "./scripts/reactCompilerPlugin.ts"]
environment = "PUBLIC_*"
