name: Dashboard checks

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    frontend-checks:
        name: frontend-checks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install frontend dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint frontend
              run: npm run lint

            - name: Build frontend
              run: npm run build

            - name: Test frontend coverage
              run: npm run test:coverage

    backend-checks:
        name: backend-checks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: backend/package-lock.json

            - name: Install root dependencies
              run: npm ci --legacy-peer-deps

            - name: Install backend dependencies
              run: npm ci
              working-directory: backend

            - name: Lint backend
              run: npm run lint
              working-directory: backend

            - name: Build backend
              run: npm run build
              working-directory: backend

            - name: Test backend coverage
              run: npm run test:coverage
              working-directory: backend

    e2e-smoke:
        name: e2e-smoke
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install frontend dependencies
              run: npm ci --legacy-peer-deps

            - name: Install backend dependencies
              run: npm ci
              working-directory: backend

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playwright smoke tests
              run: npm run test:e2e
