version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 3
    labels:
      - "type: dependencies"
      - "area: frontend"
    commit-message:
      prefix: "deps"
    ignore:
      # Compromised TanStack Router releases; see https://github.com/TanStack/router/issues/7383
      - dependency-name: "@tanstack/react-router"
        versions:
          - "1.169.8"
      - dependency-name: "@tanstack/react-router-devtools"
        versions:
          - "1.166.19"
    groups:
      frontend-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 3
    labels:
      - "type: dependencies"
      - "area: backend"
    commit-message:
      prefix: "deps"
    groups:
      backend-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 2
    labels:
      - "type: dependencies"
      - "area: ci"
    commit-message:
      prefix: "ci"
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
