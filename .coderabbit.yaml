reviews:
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_usernames: []
  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!coverage/**"
    - "!backend/coverage/**"
    - "package-lock.json"
    - "backend/package-lock.json"
